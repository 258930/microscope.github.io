<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>张店生物虚拟实验室 · 叶片主要组织观察</title>
  <link rel="stylesheet" href="yuxistyle.css">
</head>
<body>
  <div class="lab-layout">
    <!-- 左侧工作台：实验区 + 器材架 + 日志 -->
    <div class="workbench">
      <div class="bench-title">🔬 叶片主要组织观察仿真台——预习</div>
      <div class="top-guide" id="topGuide">请先点击右侧“清点器材”</div>
      <!-- 实验主舞台（放置拖拽的器材+动画） -->
      <div class="experiment-stage" id="mainStage">
        <div id="stage-guide" class="stage-guide">请先点击右侧“清点器材”</div>
        
        <!-- 切片制作区（初始隐藏） -->
        <div id="cutting-zone" class="stage-layer hidden">
          <div class="wood-block">🪵 小木板
            <div id="leaf-on-wood" class="leaf-item hidden">🍃 新鲜菠菜叶片</div>
            <div id="cut-leaf-img" class="cut-leaf-img hidden">
              <img src="叶片切割.jpg" alt="切割后的叶片">
            </div>
            <div id="blades-group" class="blades-group">
              <div class="blade b1 hidden"></div>
            </div>
            <!-- 切割/蘸水按钮（初始隐藏） -->
            <div id="cut-buttons" class="cut-buttons hidden">
              <button class="btn-green" id="btnDipWater">蘸水</button>
              <button class="btn-green" id="btnCut">切割</button>
            </div>
          </div>
          <!-- 新增：蘸水专用培养皿（初始隐藏） -->

        </div>
       <div id="dip-water-dish" class="dip-dish hidden">
        <img src="dish-with-water.png" alt="蘸水培养皿" class="dish-img">
      </div>
        <!-- 培养皿区（初始隐藏） -->
        <div id="dish-zone" class="stage-layer hidden">
          <div class="petri-dish">🧫 培养皿
            <div id="slices-in-water" class="slices-container">💧 清水 + 切片</div>
          </div>
        </div>

        <!-- 临时切片（初始隐藏） -->
        <div id="temp-slide-zone" class="stage-layer hidden">
          <div class="temp-slide">🧬 临时切片（载玻片+盖玻片）</div>
        </div>
<div id="micro-view" class="stage-layer hidden">
  <!-- 显微镜观察区（适配350*400图片） -->
  <div class="microscope-body" style="position: relative; width: 350px; height: 400px;">
    <!-- 你的显微镜图片（350*400） -->
  <a href="xinweijing.html" target="_blank" style="display:block; width:100%; height:100%;">
  <img src="显微镜.jpg" alt="显微镜" style="width: 100%; height: 100%; object-fit: cover; cursor:pointer;">
</a>
    
    <!-- 1. 粗准焦螺旋按钮（最上方，适配350*400） -->
    <button id="btnCoarseFocus" class="micro-btn coarse-focus" style="position: absolute; top: 96px; left: 125px; width: 50px; height: 45px; opacity: 0.3;background: transparent; border: none; cursor: pointer;"></button>
    <!-- 2. 细准焦螺旋按钮（粗准焦下方） -->
    <button id="btnFineFocus" class="micro-btn fine-focus" style="position: absolute; top: 160px; left: 95px; width: 50px; height: 35px; opacity: 0.3;background: transparent; border: none; cursor: pointer;"></button>
    <!-- 3. 转换器按钮（细准焦下方） -->
    <button id="btnRevolver" class="micro-btn revolver" style="position: absolute; top: 180px; left: 165px; width: 80px; height: 60px; opacity: 0.3; background: transparent; border: none; cursor: pointer;"></button>
    <!-- 4. 反光镜按钮（最下方） -->
    <button id="btnMirror" class="micro-btn mirror" style="position: absolute; top: 350px; left: 150px; width: 70px; height: 50px; opacity: 0.3;  background: transparent;border: none; cursor: pointer;"></button>
    <!-- 5. 载玻片放置按钮（载物台位置，适配350*400） -->
    <button id="btnSlidePlace" class="micro-btn slide-place" style="position: absolute; top: 195px; left: 5px; width: 80px; height: 35px; opacity: 0.3;background: transparent; border: none; cursor: pointer;"></button>
  </div>
  
  <!-- 目镜视野（保留原有） -->
  <div id="eyepiece-circle" class="eyepiece-view hidden">
    <div id="micro-image" class="micro-image blur">
      <img src="leaf-tissue.jpg" alt="叶片组织显微图" style="width: 100%; height: 100%; object-fit: cover;">
    </div>
  </div>
</div>
          <!-- <div class="microscope-body">🔬 显微镜 </div> -->
          <!-- <div id="lens-group" class="lens-group">🔍 物镜/目镜</div> -->
          <div id="eyepiece-circle" class="eyepiece-view hidden">
            <div id="micro-image" class="micro-image blur">
              <!-- 叶片组织图片（可替换为实际图片） -->
                <img src="leaf-tissue.jpg" alt="叶片组织显微图" style="width: 100%; height: 100%; object-fit: cover;">
              <!-- <div class="tissue-img">保护组织<br>营养组织<br>输导组织<br>机械组织</div> -->
            </div>
          </div>
      

        <!-- 毛笔工具（初始隐藏） -->
        <div id="brush-tool" class="brush-tool hidden">🖌️ 毛笔</div>
        <!-- 工具元素：统一用固定DOM+hidden类 -->
        <div id="tool-forceps" class="tool-item hidden">镊子</div>
        <div id="tool-slide" class="tool-item hidden">载玻片</div>
        <div id="tool-coverslide" class="tool-item hidden">盖玻片</div>
        <div id="tool-gauze" class="tool-item hidden">纱布</div>
        <div id="tool-water" class="tool-item hidden">💧 清水</div>
      </div>

      <!-- 器材架：初始隐藏，仅清点正确后显示 -->
      <div class="instruments-shelf" id="shelf" style="display: none;"></div>
    
      <!-- 日志面板 -->
      <div class="log-panel" id="logPanel">
        <div class="log-entry">[00:00] 系统就绪，等待实验开始...</div>
      </div>
    </div>

    <!-- 右侧控制面板 -->
    <div class="controls">
      <button class="restart-btn" id="restartBtn">↻</button>
      
      <div class="panel">
        <h3>📦 1. 准备工作</h3>
        <button class="btn-blue" id="prepareBtn">清点器材</button>
        <div class="step-status" id="s-prepare">⏳ 待清点</div>
      </div>

      <div class="panel">
        <h3>🔪 2. 制作临时切片</h3>
        <!-- <p class="hint">依次拖入：小木板 → 叶片 → 双面刀片 → 清水 → 毛笔 → 载玻片 → 显微镜</p> -->
        <div class="mini-status">
          步骤：<span id="s-cut-step">未开始</span>
        </div>
      </div>

      <div class="panel">
        <h3>🔍 3. 显微镜观察</h3>
        <!-- <div class="flex-row">
          <button class="btn-green" id="btnFocusUp">上升镜筒</button>
          <button class="btn-green" id="btnFocusDown">下降镜筒</button>
        </div> -->
        <p class="hint">提示：下降时请注视物镜</p>
      </div>

      <div class="panel">
        <h3>📝 4. 实验报告</h3>
        <textarea id="reportInput" placeholder="写出叶片的组织组成..." rows="3"></textarea>
        <button class="btn-blue" id="recordBtn">提交报告</button>
      </div>

      <div class="panel">
        <h3>🧹 5. 实验结束</h3>
        <button class="btn-red" id="tidyBtn">整理还原 & 评分</button>
      </div>
    </div>
  </div>

  <!-- 器材清点弹窗 -->
  <div id="equip-modal" class="modal">
    <div class="modal-content">
      <h3>器材清点（请勾选所有必需器材）</h3>
      <div class="equip-grid" id="equipGrid"></div>
      <button id="submitEquip" class="btn-green">确认清点</button>
    </div>
  </div>
  
  <!-- 评分反馈弹窗 -->
  <div id="report-modal" class="modal">
    <div class="modal-content">
      <h3>实验反馈 & 评分</h3>
      <div id="finalScore" class="final-score"></div>
      <div id="scoreDetails" class="score-details"></div>
      <button id="closeReportBtn" class="btn-blue">确认</button>
    </div>
  </div>
  <!-- 答题弹窗（默认隐藏） -->
<div id="quiz-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center;">
  <div style="width: 600px; background: white; padding: 20px; border-radius: 10px; max-height: 80vh; overflow-y: auto;">
    <h3 id="quiz-title" style="margin-top: 0;">答题纠错</h3>
    <div id="quiz-content" style="margin: 20px 0;"></div>
    <div id="quiz-hint" style="color: red; margin: 10px 0; display: none;">答案错误，请重新选择！</div>
    <div id="quiz-result" style="color: green; margin: 10px 0; display: none;">✅ 回答正确！剩余<span id="quiz-remain">0</span>道题</div>
    <button id="quiz-close" style="display: none; padding: 8px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">完成答题，返回实验</button>
  </div>
</div>
  <script src="yuxiscript.js"></script>
</body>
</html>
