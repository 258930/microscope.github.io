// 随机出题函数
function getRandomQuestions(category, n = 1) {
    if (!microscopeQuestionBank[category]) {
        console.warn(`分类${category}不存在，默认使用分类7`);
        category = 7;
    }
    const categoryQuestions = JSON.parse(JSON.stringify(microscopeQuestionBank[category]));
    const shuffled = categoryQuestions.sort(() => 0.5 - Math.random());
    return shuffled.slice(0, Math.min(n, categoryQuestions.length));
}

    let videoModal = document.getElementById('operation-video-modal');
    if (videoModal) {
        videoModal.remove();
    }

    videoModal = document.createElement('div');
    videoModal.id = 'operation-video-modal';
    videoModal.className = 'modal';
    
    videoModal.style.cssText = `

        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);

    `;
    
    videoModal.innerHTML = `
        <div class="modal-content" style="max-width: 900px; width: 90%; background: #2a2a3a; border-radius: 8px; padding: 20px; position: relative; z-index: 20001;">

                <video id="operation-video" style="position:absolute; top:0; left:0; width:100%; height:100%; border-radius:8px;" controls autoplay>
                    <source src="${videoSrc}" type="video/mp4">
                </video>
            </div>
            <button id="close-operation-video" class="btn-blue" style="padding: 10px 20px; font-size: 16px;">关闭视频，开始答题</button>
        </div>
    `;
    
    document.body.appendChild(videoModal);
    videoModal.style.display = 'flex';

    document.getElementById('close-operation-video').onclick = () => {
        const video = document.getElementById('operation-video');
        if (video) {
            video.pause();
            video.currentTime = 0;
        }
        videoModal.style.display = 'none';
        videoModal.remove();
        
        // 保存当前操作类型，用于后续标记
        window.currentOperationType = operationType;
        
        if (callback) {
            callback();
        } else {
            showQuizModal(category);
        }
    };
}
// 弹窗弹题函数

    microscopeState.currentQuestions = [];

    window.currentMicroscopeCategory = category;
    
    const modal = document.getElementById('quiz-modal');
    const content = document.getElementById('quiz-content');
    modal.style.display = 'flex';
    renderQuestion(0);
}

        // 自动加载本地 FBX + 自动转正 + 自动调亮
        function loadAutoFBXModel() {
            const loader = new FBXLoader();
                loader.load(
                 './microscope.fbx',
                (fbx) => {
                    microscopeModel = fbx;
                    const box = new THREE.Box3().setFromObject(microscopeModel);
                    const size = box.getSize(new THREE.Vector3());
                    const scale = 3.5 / size.y;
                    microscopeModel.scale.set(scale, scale, scale);
                    const scaledBox = new THREE.Box3().setFromObject(microscopeModel);
                    const center = scaledBox.getCenter(new THREE.Vector3());
                    microscopeModel.position.set(-center.x, -scaledBox.min.y - 3, -center.z);
                    
                    // ========== ✅ 自动转正：正面朝向你（关键修改）==========
                    // 原来顶部朝你，现在旋转到正面
                    microscopeModel.rotation.x = THREE.MathUtils.degToRad(-90); // 修正俯仰
                    microscopeModel.rotation.y = THREE.MathUtils.degToRad(0);   // 正面朝向
                    microscopeModel.rotation.z = 0;
                    
                    // 同步更新底部滑块显示
                    document.getElementById('model-rotation').value = 0;
                    
                    bindModelPartsByUUID(microscopeModel);
                    setupMirrorPivot();
                    
                    // ========== ✅ 模型变亮：增强材质反光（关键修改）==========
                    microscopeModel.traverse(node => {
                        if(node.isMesh) {
                            node.castShadow = false;
                            node.receiveShadow = false;
                            if(node.material) {
                                node.material.roughness = 0.9; // 降低粗糙度，更亮
                                node.material.metalness = 0.9; // 轻微金属感
                                node.material.needsUpdate = true;
                            }
                        }
                    });
                    scene.add(microscopeModel);
                    console.log("✅ 显微镜模型自动加载完成（已转正+调亮）");
                },
                undefined,
                (err) => console.error("模型加载失败：", err)
            );
        }

        // 反光镜 + 镜罩 共用旋转轴心
        function setupMirrorPivot() {
            if (!modelNodes.mirror || !modelNodes.jingzhao) return;
            const mirror = modelNodes.mirror;
            const jingzhao = modelNodes.jingzhao;
            const pivot = new THREE.Group();
            const center = new THREE.Vector3();
            new THREE.Box3().setFromObject(mirror).getCenter(center);
            pivot.position.copy(center);
            mirror.parent.add(pivot);
            pivot.add(mirror);
            pivot.add(jingzhao);
            mirror.position.sub(center);
            jingzhao.position.sub(center);
            modelNodes.mirrorPivot = pivot;
        }

        // ========== ✅ 增强光照：解决模型暗（关键修改）==========
        function setupLights() {
            // 环境光增强

            scene.add(ambientLight);
            
            // 主光增强
            const topLight = new THREE.DirectionalLight(0xffffff, 0.1);
            topLight.position.set(3, 6, 4);
            topLight.castShadow = true;
            topLight.shadow.mapSize.width = 2048;
            topLight.shadow.mapSize.height = 2048;
            scene.add(topLight);
            
            // 补光
            const fillLight = new THREE.DirectionalLight(0xffffff, 0);
            fillLight.position.set(-3, 4, -2);
            scene.add(fillLight);
            
            // 底部光
            const bottomLight = new THREE.DirectionalLight(0x88aacc, 0);
            bottomLight.position.set(0, -2, 0);
            scene.add(bottomLight);
            
            lightSource = new THREE.PointLight(0xffaa66, 0.5);
            lightSource.position.set(0, 1, 3);
            scene.add(lightSource);
        }

function bindModelPartsByUUID(model) {
    modelNodes = {};
    model.traverse(node => {
        if(!node.isMesh) return;
        for(const [k, v] of Object.entries(PART_UUIDS)){
            if(node.name === v) {
                modelNodes[k] = node;
                node.userData.initialPosition = node.position.clone();
                node.userData.initialRotation = node.rotation.clone();
            }
        }
    });

    // ==============================================
    // ✅ 核心：把 3个物镜 全部绑定到转换器上，一起旋转
    // ==============================================
    const converter = modelNodes.nosepiece; // 转换器 Zhuanhuanqi
    const obj4 = modelNodes.objective4x;    // 4倍 Dibeiwujing1
    const obj10 = modelNodes.objective10x;  // 10倍 Dibeiwujing2
    const obj40 = modelNodes.objective40x;  // 40倍 Gaobeiwujing

    if(converter && obj4 && obj10 && obj40) {
        converter.attach(obj4);   // 焊在转换器上
        converter.attach(obj10);
        converter.attach(obj40);
        console.log("✅ 物镜已全部绑定转换器，联动成功！");
    }
}

// 闪烁效果函数
function flashElements(elementIds, flashColor = 'yellow', duration = 200) {
    elementIds.forEach(id => {
        const element = document.getElementById(id);
        if (element) {
            // 保存原始颜色
            const originalColor = element.style.backgroundColor;
            
            // 设置为闪烁颜色
            element.style.backgroundColor = flashColor;
            element.style.transition = `background-color ${duration/2}ms`;
            
            // 恢复原始颜色
            setTimeout(() => {
                element.style.backgroundColor = originalColor;
                
                // 清除transition
                setTimeout(() => {
                    element.style.transition = '';
                }, duration/2);
            }, duration/2);
        }
    });
}
        function adjustFocus(offset) {
    if(modelNodes.bodyTube) modelNodes.bodyTube.position.z += offset;
    if(modelNodes.eyepiece) modelNodes.eyepiece.position.z += offset;
    if(modelNodes.zhou) modelNodes.zhou.position.z += offset;
    if(modelNodes.zhou2) modelNodes.zhou2.position.z += offset;
    // 转换器一动，三个物镜自动同步动
    if(modelNodes.nosepiece) modelNodes.nosepiece.position.z += offset;
     state.blurAmount += offset * 2;  // 用offset直接控制，不依赖正负判断
    
    // 限制blur范围，防止无限大或负数
    state.blurAmount = Math.max(0, Math.min(40, state.blurAmount));
     // 检测错误操作（示例规则）
    if (Math.abs(offset) > 1) { // 粗准焦调节过快
        if (!scoreState.violations.coarseFocus) {
            scoreState.violations.coarseFocus = true;
            deductScore('粗准焦调节过快', 0.5);
        }
    }
    
    if (state.blurAmount > 30) { // 调焦过度
        if (!scoreState.violations.fineFocus) {
            scoreState.violations.fineFocus = true;
            deductScore('调焦过度，图像模糊', 0.5);
        }
    }
    
    // 判断是否接近最清晰（假设最佳清晰度是某个值，比如5）
    if (Math.abs(state.blurAmount - 7) < 2) {
        addLog("✅ 物象已调节至最清晰！");
    } else if (state.blurAmount > 7) {
        addLog("⬆️ 物象变模糊了（调焦过度）");
    } else {
        addLog("⬇️ 物象正在变清晰");
    }
}

const state = {
    focusHeight: 0,         // 最佳焦距位置
    currentObjective: 1,      // 1=低倍 2=高倍
    focusValue: 50,           // 焦距滑块

const scoreState = {
    totalDeduction: 0,        // 总扣分
    maxDeduction: 2,          // 最多扣2分
    violations: {
        coarseFocus: false,    // 粗准焦错误
        fineFocus: false,      // 细准焦错误
        objectiveSwitch: false // 物镜切换错误
    }
};
// 扣分函数
function deductScore(reason, points) {
    if (scoreState.totalDeduction >= scoreState.maxDeduction) return;
    
    // 计算实际扣分（不超过剩余可扣分数）
    const remaining = scoreState.maxDeduction - scoreState.totalDeduction;
    const actualDeduction = Math.min(points, remaining);
    
    if (actualDeduction > 0) {
        scoreState.totalDeduction += actualDeduction;
        
        // 发送扣分信息到父页面（index.html）
        if (window.opener) {
            window.opener.postMessage({
                type: 'microscope-deduction',
                reason: reason,
                points: actualDeduction,
                totalDeduction: scoreState.totalDeduction
            }, '*');
        }
        
        // 也可以使用 localStorage 传递（备选方案）
        localStorage.setItem('microscopeDeduction', JSON.stringify({
            reason: reason,
            points: actualDeduction,
            totalDeduction: scoreState.totalDeduction,
            timestamp: Date.now()
        }));
        
        addLog(`⚠️ 扣分：${reason} (-${actualDeduction}分)`);
    }
}

}

// 实时更新目镜效果（核心）
function updateEyepieceEffect() {
    if (!modelNodes.bodyTube) return;

    const img = document.getElementById('sample-img');
    const overlay = document.getElementById('light-overlay');
    const view = document.getElementById('eyepiece-view');
    const brightness = state.mirrorBrightness;
    const displayBlur = Math.max(0, state.blurAmount);

    // 统一背景亮度（放置前后完全一样）
    view.style.background = `rgb(${brightness*255},${brightness*255},${brightness*255})`;
    overlay.style.opacity = 0;

    if (!state.slidePlaced) {
        img.style.display = "none";
        return;
    }

    // ✅ 关键：图片亮度 = 背景亮度（完全同步）
    img.style.display = "block";
    img.style.filter = `blur(${displayBlur}px)`;
    img.style.opacity = brightness; // 这里！用透明度匹配亮度，100%无缝
}

// 遮光器旋转（丝滑动画 + 闪烁 + 日志）
// 遮光器旋转（无限顺时针 + 丝滑动画 + 闪烁 + 日志）
let diaphragmTotalRotation = 0; // 全局累计旋转角度
function rotateDiaphragm() {
    if (!modelNodes.zheguangqi) return;

    // 每次点击 +1 档位（0=标准，1=最大）
    state.diaphragmLevel = (state.diaphragmLevel + 1) % 2;

    // 每次都 **顺时针旋转固定角度**（60度，很自然）
    diaphragmTotalRotation += Math.PI / 3; 

    // 日志 + 状态
    if (state.diaphragmLevel === 1) {
          addLog("🔄 已旋转遮光器至标准通光孔");
        document.getElementById("diaphragmInfo").innerText = "⚙️ 当前通光孔：标准";
     
    } else {
         addLog("✅ 已转换至最大通光孔");
        document.getElementById("diaphragmInfo").innerText = "⚙️ 当前通光孔：最大";
    }

    // 遮光器闪烁
    flashKnob('zheguangqi');

    // 丝滑 顺时针旋转动画（永远顺时针！）
    gsap.to(modelNodes.zheguangqi.rotation, {
        z: diaphragmTotalRotation, // 累计角度，一直顺时针
        duration: 0.5,
        ease: "back.out(1.2)",
        overwrite: true,
    });
}
function flashKnob(knobName) {
    const knob = modelNodes[knobName];
    if (!knob) return;

    // 创建一个临时的高亮材质
    const originalMaterials = [];
     // 改为只处理当前节点，不遍历子物体
    if (knob.isMesh && knob.material) {
        originalMaterials.push({
            mesh: knob,
            material: knob.material
        });
    }
    // knob.traverse(n => {
    //     if (n.isMesh && n.material) {
    //         originalMaterials.push({
    //             mesh: n,
    //             material: n.material,
    //             materialIndex: -1
    //         });
    //     }
    // });

    let count = 0;
    const interval = setInterval(() => {
        const isOrange = count % 2 === 0;
        
        originalMaterials.forEach(item => {
            const mesh = item.mesh;
            if (isOrange) {
                // 创建临时高亮材质
                const highlightMaterial = new THREE.MeshPhongMaterial({
                    color: 0xff8800,
                    emissive: 0x442200,
                    emissiveIntensity: 0.5
                });
                
                // 保存原始材质并替换
                item.originalMaterial = mesh.material;
                mesh.material = highlightMaterial;
            } else {
                // 恢复原始材质
                if (item.originalMaterial) {
                    mesh.material = item.originalMaterial;
                }
            }
            mesh.material.needsUpdate = true;
        });
        
        count++;
        
        if (count > 4) {
            clearInterval(interval);           
            // 确保所有材质都恢复
            originalMaterials.forEach(item => {
                if (item.originalMaterial) {
                    item.mesh.material = item.originalMaterial;
                    item.mesh.material.needsUpdate = true;
                }
            });
        }
    }, 30);
}
